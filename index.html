<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoConnect AI | Multi-Garaje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .tab-active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .bg-pattern { background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 10px 10px; }
    </style>
</head>
<body class="bg-pattern min-h-screen pb-24">

    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-600 italic tracking-tighter">AUTOCONNECT <span class="text-slate-900">AI</span></h1>
            <button onclick="mostrarFormularioNuevo()" class="bg-blue-600 text-white text-[10px] font-bold px-3 py-2 rounded-full uppercase shadow-lg">+ Añadir Auto</button>
        </div>
    </header>

    <nav class="bg-white border-b border-slate-200 flex justify-around sticky top-[61px] z-40 shadow-sm">
        <button onclick="cambiarTab('garaje')" id="btn-garaje" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest tab-active">Mi Garaje</button>
        <button onclick="cambiarTab('directorio')" id="btn-directorio" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-400">Directorio</button>
    </nav>

    <main class="container mx-auto p-4 max-w-lg">
        
        <div id="view-garaje" class="space-y-6">
            <div id="lista-autos" class="space-y-4 mt-4">
                </div>
        </div>

        <div id="view-directorio" class="hidden mt-4 space-y-4">
            <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-[2rem] p-6 text-white shadow-lg">
                <h3 class="text-lg font-black uppercase italic tracking-tighter">¿Eres profesional?</h3>
                <p class="text-[11px] opacity-90 mb-4">Aparece como "Verificado" y recibe más clientes.</p>
                <button onclick="registrarNegocio()" class="bg-orange-500 text-white font-black py-3 px-6 rounded-xl text-[10px] uppercase shadow-lg">Registrar mi Negocio</button>
            </div>
            <div id="providerList" class="space-y-4 pt-4"></div>
        </div>

        <div id="modal-auto" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
            <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl">
                <h2 class="text-2xl font-black text-slate-800 mb-2">Nuevo Vehículo</h2>
                <p class="text-slate-500 text-xs mb-6 text-balance">Registra otro auto para activar el seguimiento por IA.</p>
                <input type="text" id="vinInput" placeholder="VIN (17 DÍGITOS)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-3 font-mono uppercase text-sm">
                <input type="number" id="mileageInput" placeholder="Millaje Actual" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-4 font-bold">
                <div class="flex gap-2">
                    <button onclick="cerrarFormulario()" class="flex-1 bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl uppercase text-[10px]">Cancelar</button>
                    <button onclick="activarAI()" class="flex-[2] bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase text-[10px] tracking-widest">Vincular</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURACIÓN ---
        const WHATSAPP_ADMIN = "17873820391"; // Reemplaza con tu número real
        let misAutos = JSON.parse(localStorage.getItem('garaje_autoconnect')) || [];
        
        const proveedores = [
            { nombre: "Master Mechanic", tipo: "Taller Premium", zona: "Area Metro", rating: "5.0", wa: "17873820391", icono: "👨‍🔧", verificado: true },
            { nombre: "Parts Online", tipo: "Repuestos", zona: "Todo el país", rating: "4.7", wa: "17873820391", icono: "📦", verificado: false }
        ];

        // --- FUNCIONES CORE ---
        window.onload = () => { renderGaraje(); };

        function cambiarTab(tab) {
            document.getElementById('view-garaje').classList.toggle('hidden', tab !== 'garaje');
            document.getElementById('view-directorio').classList.toggle('hidden', tab !== 'directorio');
            document.getElementById('btn-garaje').classList.toggle('tab-active', tab === 'garaje');
            document.getElementById('btn-directorio').classList.toggle('tab-active', tab === 'directorio');
            if(tab === 'directorio') renderDirectorio();
        }

        function mostrarFormularioNuevo() { document.getElementById('modal-auto').classList.remove('hidden'); }
        function cerrarFormulario() { document.getElementById('modal-auto').classList.add('hidden'); }

        async function activarAI() {
            const vin = document.getElementById('vinInput').value.trim();
            const miles = parseInt(document.getElementById('mileageInput').value);
            if(!vin || isNaN(miles)) return alert("Completa los datos");

            try {
                const res = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVin/${vin}?format=json`);
                const data = await res.json();
                const getVal = (v) => data.Results.find(r => r.Variable === v)?.Value || "Auto";

                const nuevoAuto = {
                    id: Date.now(),
                    carName: `${getVal("Model Year")} ${getVal("Make")} ${getVal("Model")}`,
                    vin: vin.toUpperCase(),
                    startMiles: miles,
                    startDate: new Date().getTime(),
                    dailyUsage: 45,
                    lastDone: {}
                };

                misAutos.push(nuevoAuto);
                localStorage.setItem('garaje_autoconnect', JSON.stringify(misAutos));
                cerrarFormulario();
                renderGaraje();
            } catch (e) { alert("Error de conexión con NHTSA"); }
        }

        function renderGaraje() {
            const container = document.getElementById('lista-autos');
            if(misAutos.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400 text-sm">No tienes autos registrados.<br>Toca "+ Añadir Auto" para empezar.</div>`;
                return;
            }

            container.innerHTML = misAutos.map(auto => {
                const dias = (new Date().getTime() - auto.startDate) / (1000 * 60 * 60 * 24);
                const currentMiles = Math.floor(auto.startMiles + (dias * auto.dailyUsage));
                
                // Cálculo de alertas (aceite como ejemplo)
                const ultimoAceite = auto.lastDone["Aceite"] || 0;
                const faltanAceite = 5000 - (currentMiles - ultimoAceite);

                return `
                    <div class="bg-white rounded-[2rem] p-6 shadow-lg border border-slate-100">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-black text-lg text-slate-800 leading-tight">${auto.carName}</h3>
                                <p class="text-[9px] font-mono text-slate-400 uppercase tracking-tighter">VIN: ${auto.vin}</p>
                            </div>
                            <button onclick="eliminarAuto(${auto.id})" class="text-red-400 text-xs font-bold">Eliminar</button>
                        </div>
                        
                        <div class="bg-slate-900 rounded-2xl p-4 text-white flex justify-between items-center mb-4">
                            <div>
                                <p class="text-[8px] font-bold text-blue-400 uppercase">Millaje IA</p>
                                <p class="text-2xl font-black italic">${currentMiles.toLocaleString()}</p>
                            </div>
                            <button onclick="editarMillaje(${auto.id})" class="bg-blue-600 p-2 rounded-lg text-[9px] font-bold">✏️ EDITAR</button>
                        </div>

                        <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 flex justify-between items-center">
                            <span class="text-[10px] font-bold text-blue-800 uppercase italic">Próximo Aceite:</span>
                            <span class="text-[10px] font-black ${faltanAceite < 500 ? 'text-red-600' : 'text-blue-600'}">${Math.max(0, Math.floor(faltanAceite)).toLocaleString()} mi</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderDirectorio() {
            const container = document.getElementById('providerList');
            container.innerHTML = proveedores.map(p => `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">${p.icono}</span>
                            <div>
                                <p class="font-black text-slate-800 text-sm uppercase flex items-center gap-1">
                                    ${p.nombre} 
                                    ${p.verificado ? '<span class="text-blue-500 text-[12px]" title="Verificado">✅</span>' : ''}
                                </p>
                                <p class="text-[10px] text-blue-600 font-bold uppercase">${p.tipo}</p>
                            </div>
                        </div>
                        <span class="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-1 rounded-lg font-bold">⭐ ${p.rating}</span>
                    </div>
                    <div class="flex justify-between items-center border-t pt-4 border-slate-50">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">📍 ${p.zona}</span>
                        <a href="https://wa.me/${p.wa}?text=Hola, los vi en AutoConnect. Busco servicio profesional." 
                           target="_blank" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold uppercase text-[9px] tracking-widest">Contactar</a>
                    </div>
                </div>
            `).join('');
        }

        function editarMillaje(id) {
            const n = prompt("Nuevo millaje real:");
            if(!n) return;
            misAutos = misAutos.map(a => {
                if(a.id === id) {
                    a.startMiles = parseInt(n);
                    a.startDate = new Date().getTime();
                }
                return a;
            });
            localStorage.setItem('garaje_autoconnect', JSON.stringify(misAutos));
            renderGaraje();
        }

        function eliminarAuto(id) {
            if(confirm("¿Seguro que quieres borrar este vehículo de tu garaje?")) {
                misAutos = misAutos.filter(a => a.id !== id);
                localStorage.setItem('garaje_autoconnect', JSON.stringify(misAutos));
                renderGaraje();
            }
        }

        function registrarNegocio() {
            window.open(`https://wa.me/${WHATSAPP_ADMIN}?text=Quiero registrar mi negocio como VIP en AutoConnect AI`, '_blank');
        }
    </script>
</body>
</html>
